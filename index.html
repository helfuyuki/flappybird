<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>

body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
touch-action:none;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

/* PERSONAGEM */

let plane = {
x:80,
y:300,
width:80,
height:80,
velocity:0
};

let gravity = 0.25;
let jump = -6;

/* TORRES */

let towerX = canvas.width;
let gapY = 200;
let gapSize = 200;
let speed = 2;

/* SCORE */

let score = 0;
let passed = false;

/* ESTADO */

let gameOver = false;

/* IMAGENS */

const frames = [];

for(let i=1;i<=5;i++){
let img = new Image();
img.src = "frame"+i+".png";
frames.push(img);
}

/* ANIMAÇÃO */

let currentFrame = 0;
let frameTimer = 0;
let frameSpeed = 5;

/* AÇÃO */

function action(){

if(gameOver){
resetGame();
return;
}

plane.velocity = jump;

}

/* INPUT */

document.addEventListener("keydown",function(e){

if(e.code === "Space"){
action();
}

});

canvas.addEventListener("mousedown",action);

canvas.addEventListener("touchstart",function(e){
e.preventDefault();
action();
},{passive:false});

/* RESET */

function resetGame(){

plane.y = 300;
plane.velocity = 0;

towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);

score = 0;
passed = false;
gameOver = false;

}

/* COLISÃO */

function checkCollision(){

if(
plane.x + plane.width > towerX &&
plane.x < towerX + 60 &&
(
plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
gameOver = true;
}

}

/* UPDATE */

function update(delta){

if(gameOver) return;

/* FÍSICA */

plane.velocity += gravity * delta;
plane.y += plane.velocity * delta;

/* CHÃO */

if(plane.y >= canvas.height-plane.height){
gameOver = true;
}

/* TORRES */

towerX -= speed * delta;

if(towerX < -60){
towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);
passed = false;
}

/* SCORE */

if(towerX + 60 < plane.x && !passed){
score++;
passed = true;
}

/* COLISÃO */

checkCollision();

/* ANIMAÇÃO */

frameTimer += delta;

if(frameTimer >= frameSpeed){

frameTimer = 0;
currentFrame++;

if(currentFrame >= frames.length){
currentFrame = 0;
}

}

}

/* DESENHO */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* PERSONAGEM */

ctx.drawImage(frames[currentFrame],plane.x,plane.y,plane.width,plane.height);

/* TORRES */

ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

/* SCORE */

ctx.fillStyle="black";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,10,30);

/* GAME OVER */

if(gameOver){

ctx.fillStyle="black";
ctx.font="40px Arial";
ctx.fillText("Game Over",110,300);

ctx.font="20px Arial";
ctx.fillText("Press Jump to Restart",90,340);

}

}

/* LOOP */

let lastTime = 0;

function loop(time){

let delta = (time-lastTime)/16.67;
lastTime = time;

update(delta);
draw();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>
