<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plane Game</title>

<style>
body{
margin:0;
background:skyblue;
overflow:hidden;
touch-action: manipulation;
}

canvas{
display:block;
margin:auto;
background:white;
border:2px solid black;
}
</style>

</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let plane = {
x:80,
y:300,
width:40,
height:40,
velocity:0
};

let gravity = 0.4;
let jump = -8;

let towerX = 400;
let gapY = 200;
let gapSize = 180;

let speed = 1.5;

let score = 0;
let passed = false;
let allahuAkbar = false;

function action(){

if(allahuAkbar){
resetGame();
allahuAkbar = false;
}else{
plane.velocity = jump;
}

}

document.addEventListener("keydown", function(e){
if(e.code === "Space"){
action();
}
});

canvas.addEventListener("mousedown", action);

canvas.addEventListener("touchstart", function(e){
e.preventDefault();
action();
});

function resetGame(){

plane.y = 300;
plane.velocity = 0;

towerX = 400;
gapY = Math.random() * (canvas.height - gapSize);

score = 0;
passed = false;

}

function checkCollision(){

if(
plane.x < towerX + 60 &&
plane.x + plane.width > towerX &&
(
plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
allahuAkbar = true;
}

}

function update(){

if(allahuAkbar) return;

plane.velocity += gravity;
plane.y += plane.velocity;

if(plane.y < 0){
plane.y = 0;
plane.velocity = 0;
}

if(plane.y > canvas.height - plane.height){
allahuAkbar = true;
}

towerX -= speed;

if(towerX < -60){
towerX = canvas.width;
gapY = Math.random() * (canvas.height - gapSize);
passed = false;
}

if(towerX + 60 < plane.x && !passed){
score++;
passed = true;
}

checkCollision();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "red";
ctx.fillRect(plane.x, plane.y, plane.width, plane.height);

ctx.fillStyle = "gray";

ctx.fillRect(towerX,0,60,gapY);

ctx.fillRect(
towerX,
gapY + gapSize,
60,
canvas.height
);

ctx.fillStyle = "black";
ctx.font = "24px Arial";
ctx.fillText("Score: " + score, 10, 30);

if(allahuAkbar){

ctx.fillStyle = "black";
ctx.font = "40px Arial";
ctx.fillText("Game Over!", 90, 300);

ctx.font = "20px Arial";
ctx.fillText("Tap or SPACE to restart", 70, 340);

}

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
