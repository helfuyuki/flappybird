<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Game</title>

<style>

body{
margin:0;
background:#191970;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
touch-action:none;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<audio id="backgroundMusic" src="playlist.mp3" loop></audio>
<audio id="jumpSound" src="jump.mp3"></audio>
<audio id="menuMusic" src="kitty.mp3" loop></audio>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

/* ÁUDIOS */

const backgroundMusic=document.getElementById("backgroundMusic")
backgroundMusic.volume=0.6

const jumpSound=document.getElementById("jumpSound")
jumpSound.volume=0.2

const menuMusic=document.getElementById("menuMusic")
menuMusic.volume=0.5

/* BACKGROUND */

const sky=new Image()
sky.src="sky.png"

/* CANOS */

const pipeBottom=new Image()
pipeBottom.src="cano1.png"

const pipeTop=new Image()
pipeTop.src="cano2.png"

/* PERSONAGEM */

let plane={
x:80,
y:300,
width:80,
height:80,
velocity:0
}

let gravity=0.25
let jump=-6

/* CANOS */

let towerX=canvas.width
let gapSize=250
let gapY=Math.random()*(canvas.height-gapSize-200)
let speed=2

/* SCORE */

let score=0
let passed=false

/* ESTADO */

let gameState="menu"
let gameOver=false

/* INPUT */

function action(){

if(gameState==="menu"){

gameState="game"
menuMusic.pause()

backgroundMusic.currentTime=0
backgroundMusic.play().catch(()=>{})

resetGame()
return

}

if(gameOver){

resetGame()
return

}

plane.velocity=jump

jumpSound.currentTime=0
jumpSound.play().catch(()=>{})

}

/* CONTROLES */

canvas.addEventListener("mousedown",function(){

if(gameState==="menu"){

backgroundMusic.play().catch(()=>{})

}

action()

})

canvas.addEventListener("touchstart",function(){

if(gameState==="menu"){

backgroundMusic.play().catch(()=>{})

}

action()

})

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

action()

}

})

/* RESET */

function resetGame(){

plane.y=300
plane.velocity=0

towerX=canvas.width
gapY=Math.random()*(canvas.height-gapSize-200)

score=0
passed=false
gameOver=false

}

/* COLISÃO */

function checkCollision(){

if(

plane.x+plane.width>towerX &&
plane.x<towerX+80 &&
(plane.y<gapY || plane.y+plane.height>gapY+gapSize)

){

gameOver=true

}

}

/* UPDATE */

function update(){

if(gameState!=="game") return
if(gameOver) return

plane.velocity+=gravity
plane.y+=plane.velocity

if(plane.y>=canvas.height-plane.height){

gameOver=true

}

towerX-=speed

if(towerX<-80){

towerX=canvas.width
gapY=Math.random()*(canvas.height-gapSize-200)
passed=false

}

if(towerX+80<plane.x && !passed){

score++
passed=true

}

checkCollision()

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(sky,0,0,canvas.width,canvas.height)

ctx.drawImage(pipeTop,towerX,0,80,gapY)
ctx.drawImage(pipeBottom,towerX,gapY+gapSize,80,canvas.height)

ctx.fillStyle="red"
ctx.fillRect(plane.x,plane.y,plane.width,plane.height)

ctx.fillStyle="black"
ctx.font="24px Arial"
ctx.fillText("Score: "+score,10,30)

if(gameState==="menu"){

ctx.font="30px Arial"
ctx.fillText("Tap to Start",120,350)

}

if(gameOver){

ctx.font="40px Arial"
ctx.fillText("Game Over",110,300)

}

}

/* LOOP */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

menuMusic.play().catch(()=>{})

loop()

</script>

</body>
</html>
