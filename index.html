<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>

body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
touch-action:none;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

/* PERSONAGEM */

let plane = {
x:80,
y:300,
width:80,
height:80,
velocity:0
};

let gravity = 0.25;
let jump = -6;
let falling = false;

/* TORRES */

let towerX = canvas.width;
let gapY = 200;
let gapSize = 200;

let speed = 2;

/* SCORE */

let score = 0;
let passed = false;
let allahuAkbar = false;

/* MENU */

let gameState = "menu";
let menuOption = 0;
let jumpKey = "Space";
let waitingKey = false;

let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(isMobile){
gameState = "game";
}

/* IMAGENS */

const frames = [];

for(let i = 1; i <= 5; i++){
const img = new Image();
img.src = "frame"+i+".png";
frames.push(img);
}

const fallImage = new Image();
fallImage.src = "caindo.png";

/* ANIMAÇÃO */

let currentFrame = 0;
let frameTimer = 0;
let frameSpeed = 5;

/* AÇÃO */

function action(){

if(allahuAkbar){
resetGame();
return;
}

if(gameState === "game"){
plane.velocity = jump;
}

}

/* TECLADO */

document.addEventListener("keydown", function(e){

if(gameState === "menu"){

if(waitingKey){
jumpKey = e.code;
waitingKey = false;
return;
}

if(e.code === "ArrowUp") menuOption = 0;
if(e.code === "ArrowDown") menuOption = 1;

if(e.code === "Enter"){

if(menuOption === 0){
gameState = "game";
}

if(menuOption === 1){
waitingKey = true;
}

}

return;
}

if(e.code === jumpKey){
action();
}

});

/* MOUSE */

canvas.addEventListener("mousedown", action);

/* TOUCH */

canvas.addEventListener("touchstart", function(e){

e.preventDefault();

if(gameState === "menu"){

if(menuOption === 0){
gameState = "game";
}

if(menuOption === 1){
waitingKey = true;
}

return;

}

action();

},{passive:false});

/* RESET */

function resetGame(){

plane.y = 300;
plane.velocity = 0;

towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);

score = 0;
passed = false;
allahuAkbar = false;
falling = false;

gameState = "game";

}

/* COLISÃO */

function checkCollision(){

if(
plane.x + plane.width > towerX &&
plane.x < towerX + 60 &&
(
plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
falling = true;
plane.velocity = 2;
}

}

/* UPDATE */

function update(delta){

if(gameState !== "game") return;
if(allahuAkbar) return;

/* FÍSICA */

plane.velocity += gravity * delta;
plane.y += plane.velocity * delta;

/* CHÃO */

if(plane.y >= canvas.height-plane.height){
plane.y = canvas.height-plane.height;

if(falling){
allahuAkbar = true;
}

}

/* TORRES */

towerX -= speed * delta;

if(towerX < -60){
towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);
passed = false;
}

/* SCORE */

if(towerX + 60 < plane.x && !passed){
score++;
passed = true;
}

/* COLISÃO */

if(!falling){
checkCollision();
}

/* ANIMAÇÃO */

frameTimer += delta;

if(frameTimer >= frameSpeed){
frameTimer = 0;
currentFrame++;

if(currentFrame >= frames.length){
currentFrame = 0;
}
}

}

/* DESENHO */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(gameState === "game"){

/* PERSONAGEM */

if(falling){
ctx.drawImage(fallImage, plane.x, plane.y, plane.width, plane.height);
}else if(plane.velocity > 0){
ctx.drawImage(fallImage, plane.x, plane.y, plane.width, plane.height);
}else{
ctx.drawImage(frames[currentFrame], plane.x, plane.y, plane.width, plane.height);
}

/* TORRES */

ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

/* SCORE */

ctx.fillStyle="black";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,10,30);

}

/* GAME OVER */

if(allahuAkbar){

ctx.font="40px Arial";
ctx.fillText("Allahu Akbar",70,300);

ctx.font="20px Arial";
ctx.fillText("Press Jump to Restart",70,340);

}

/* MENU */

if(gameState === "menu"){

ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Plane Game",120,150);

ctx.font="20px Arial";

if(menuOption === 0){
ctx.fillText("> Start Game",130,250);
}else{
ctx.fillText("Start Game",130,250);
}

if(menuOption === 1){
ctx.fillText("> Change Jump Key",110,300);
}else{
ctx.fillText("Change Jump Key",110,300);
}

if(waitingKey){
ctx.fillText("Press a new key...",110,360);
}

}

}

/* LOOP */

let lastTime = 0;

function loop(time){

let delta = (time - lastTime) / 16.67;
lastTime = time;

update(delta);
draw();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>
