<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plane Game</title>

<style>
body{
margin:0;
background:skyblue;
overflow:hidden;
touch-action: manipulation;
}

canvas{
display:block;
margin:auto;
background:white;
border:2px solid black;
}
</style>

</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let plane = {
x:80,
y:300,
width:40,
height:40,
velocity:0
};

let gravity = 0.4;
let jump = -8;

let towerX = 400;
let gapY = 200;
let gapSize = 180;

let speed = 1.5;

let score = 0;
let passed = false;
let allahuAkbar = false;

function action(){

if(allahuAkbar){
resetGame();
allahuAkbar = false;
}else{
plane.velocity = jump;
}

}

document.addEventListener("keydown", function(e){
if(e.code === "Space"){
action();
}
});

canvas.addEventListener("mousedown", action);

canvas.addEventListener("touchstart", function(e){
e.preventDefault();
action();
});

function resetGame(){

plane.y = 300;
plane.velocity = 0;

score = 0;

}

if(
plane.x < towerX + 60 &&
plane.x + plane.width > towerX &&

plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
allahuAkbar = true;
}

}

if(allahuAkbar) return;

}
