<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>

body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:black;
border:2px solid black;
touch-action:none;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* BACKGROUND */

const bg = new Image();
bg.src = "cenario.png.png";

let bgY = 0;
let bgSpeed = 0.5;

/* PLAYER */

let plane = {
x:80,
y:300,
w:40,
h:40,
v:0
};

let gravity = 0.5;
let jump = -9;

/* TOWERS */

let towerX = canvas.width;
let gapY = 200;
let gapSize = 170;
let speed = 2;

/* GAME STATE */

let score = 0;
let passed = false;
let dead = false;

/* INPUT */

function jumpAction(){

if(dead){
resetGame();
return;
}

plane.v = jump;

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space") jumpAction();
});

canvas.addEventListener("mousedown",jumpAction);

canvas.addEventListener("touchstart",(e)=>{
e.preventDefault();
jumpAction();
},{passive:false});

/* RESET */

function resetGame(){

plane.y=300;
plane.v=0;

towerX=canvas.width;
gapY=Math.random()*(canvas.height-gapSize);

score=0;
passed=false;
dead=false;

}

/* COLLISION */

function collision(){

if(
plane.x < towerX+60 &&
plane.x+plane.w > towerX &&
(
plane.y < gapY ||
plane.y+plane.h > gapY+gapSize
)
){
dead=true;
}

}

/* UPDATE */

function update(){

if(dead) return;

plane.v+=gravity;
plane.y+=plane.v;

if(plane.y<0){
plane.y=0;
plane.v=0;
}

if(plane.y>canvas.height-plane.h){
dead=true;
}

towerX-=speed;

if(towerX<-60){
towerX=canvas.width;
gapY=Math.random()*(canvas.height-gapSize);
passed=false;
}

if(towerX+60<plane.x && !passed){
score++;
passed=true;
}

collision();

/* BACKGROUND MOVE */

bgY+=bgSpeed;

if(bgY>=canvas.height){
bgY=0;
}

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* BACKGROUND */

ctx.drawImage(bg,0,bgY-canvas.height,canvas.width,canvas.height);
ctx.drawImage(bg,0,bgY,canvas.width,canvas.height);

/* PLAYER */

ctx.fillStyle="red";
ctx.fillRect(plane.x,plane.y,plane.w,plane.h);

/* TOWERS */

ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

/* SCORE */

ctx.fillStyle="black";
ctx.font="22px Arial";
ctx.fillText("Score: "+score,10,30);

/* GAME OVER */

if(dead){

ctx.font="40px Arial";
ctx.fillText("Game Over",100,320);

ctx.font="20px Arial";
ctx.fillText("Tap to restart",130,350);

}

}

/* LOOP */

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
