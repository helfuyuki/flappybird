<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Game</title>

<style>

body{
margin:0;
background:#191970;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
touch-action:none;
}

#ui{
position:absolute;
bottom:20px;
display:flex;
gap:10px;
}

button{
font-size:20px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#f0f0f0;
cursor:pointer;
}

button:hover{
background:#ddd;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<div id="ui">
<button id="btnUp">▲</button>
<button id="btnDown">▼</button>
<button id="btnLeft">◀</button>
<button id="btnRight">▶</button>
<button id="btnA">OK</button>
</div>

<audio id="backgroundMusic" src="playlist.mp3" loop></audio>
<audio id="menuMusic" src="kitty.mp3" loop></audio>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

ctx.imageSmoothingEnabled=false;

/* BACKGROUND */

const sky=new Image();
sky.src="sky.png";

/* CANOS */

const pipeBottom=new Image();
pipeBottom.src="cano1.png";

const pipeTop=new Image();
pipeTop.src="cano2.png";

/* NUVENS */

const clouds=[];

for(let i=1;i<=3;i++){
let img=new Image();
img.src="cloud"+i+".png";
clouds.push(img);
}

let cloudList=[];

for(let i=0;i<8;i++){

cloudList.push({
x:Math.random()*canvas.width,
y:Math.random()*300,
speed:1+Math.random()*0.6,
frame:Math.floor(Math.random()*clouds.length)
});

}

/* PERSONAGEM */

let plane={
x:80,
y:300,
width:80,
height:80,
velocity:0
};

let gravity=0.25;
let jump=-6;

/* CANOS */

let towerX=canvas.width;

let gapSize=250;

let gapY=Math.random()*(canvas.height-gapSize-200);

let speed=2;

/* SCORE */

let score=0;
let passed=false;

/* ESTADO */

let gameState="menu";
let gameOver=false;

let menuOption=0;
let menuPage="main";

let paused=false;

/* VOLUME */

let musicVolume=0.4;
let sfxVolume=0.2;

/* PERSONAGEM */

const frames=[];

for(let i=1;i<=5;i++){
let img=new Image();
img.src="frame"+i+".png";
frames.push(img);
}

const fallImage=new Image();
fallImage.src="caindo.png";

/* ANIMAÇÃO DO GATO */

let frameIndex=0;
let frameTimer=0;
let frameSpeed=6;

/* AUDIO */

const backgroundMusic=document.getElementById("backgroundMusic");
backgroundMusic.volume=musicVolume;

const menuMusic=document.getElementById("menuMusic");
menuMusic.volume=0.5;

/* SOM DO PULO */

const jumpSounds=[];

for(let i=0;i<4;i++){
let s=new Audio("jump.mp3");
s.volume=sfxVolume;
jumpSounds.push(s);
}

let jumpIndex=0;
let isJumpSoundPlaying=false;

function playJump(){

if(isJumpSoundPlaying)return;

isJumpSoundPlaying=true;

let s=jumpSounds[jumpIndex];

s.currentTime=0;

s.play().then(()=>{

s.onended=function(){
isJumpSoundPlaying=false;
};

}).catch(()=>{
isJumpSoundPlaying=false;
});

jumpIndex++;

if(jumpIndex>=jumpSounds.length)
jumpIndex=0;

}

/* MENU MUSIC */

function playMenuMusic(){
menuMusic.play().catch(()=>{});
}

function stopMenuMusic(){
menuMusic.pause();
menuMusic.currentTime=0;
}

/* MENU ACTION */

function action(){

if(gameState==="menu"){

if(menuPage==="main"){

if(menuOption===0){

gameState="game";
resetGame();

stopMenuMusic();
backgroundMusic.play();

}

if(menuOption===1){
menuPage="controls";
menuOption=0;
}

if(menuOption===2){
menuPage="audio";
menuOption=0;
}

return;

}

if(menuPage==="controls"){

if(menuOption===1){
menuPage="main";
menuOption=0;
}

return;

}

if(menuPage==="audio"){

if(menuOption===2){
menuPage="main";
menuOption=0;
}

return;

}

}

if(gameOver){
resetGame();
return;
}

if(gameState==="game"){
plane.velocity=jump;
playJump();
}

}

/* VOLUME */

function adjustMusicVolume(amount){

musicVolume+=amount;

if(musicVolume<0)musicVolume=0;
if(musicVolume>1)musicVolume=1;

backgroundMusic.volume=musicVolume;

}

function adjustSFXVolume(amount){

sfxVolume+=amount;

if(sfxVolume<0)sfxVolume=0;
if(sfxVolume>1)sfxVolume=1;

for(let s of jumpSounds){
s.volume=sfxVolume;
}

}

/* UPDATE */

function update(delta){

if(gameState!=="game")return;
if(paused)return;
if(gameOver)return;

/* NUVENS */

for(let cloud of cloudList){

cloud.x-=cloud.speed*delta;

if(cloud.x<-150){

cloud.x=canvas.width+Math.random()*100;
cloud.y=Math.random()*300;

}

}

plane.velocity+=gravity*delta;
plane.y+=plane.velocity*delta;

if(plane.y>=canvas.height-plane.height)
gameOver=true;

towerX-=speed*delta;

if(towerX<-80){

towerX=canvas.width;

gapY=Math.random()*(canvas.height-gapSize-200);

passed=false;

}

if(towerX+80<plane.x && !passed){

score++;
passed=true;

}

checkCollision();

}

/* COLISÃO */

function checkCollision(){

const margin=12;

const px=plane.x+margin;
const py=plane.y+margin;
const pw=plane.width-margin*2;
const ph=plane.height-margin*2;

if(px+pw>towerX && px<towerX+80 && py<gapY)
gameOver=true;

if(px+pw>towerX && px<towerX+80 && py+ph>gapY+gapSize)
gameOver=true;

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(sky,0,0,canvas.width,canvas.height);

/* NUVENS */

for(let cloud of cloudList){
ctx.drawImage(clouds[cloud.frame],cloud.x,cloud.y,120,70);
}

/* CANOS */

ctx.drawImage(pipeTop,towerX,0,80,gapY);
ctx.drawImage(pipeBottom,towerX,gapY+gapSize,80,canvas.height);

/* GATO */

if(gameState==="game"||gameOver){

if(plane.velocity>0){

ctx.drawImage(fallImage,plane.x,plane.y,plane.width,plane.height);

}else{

frameTimer++;

if(frameTimer>frameSpeed){

frameTimer=0;
frameIndex++;

if(frameIndex>=frames.length)
frameIndex=0;

}

ctx.drawImage(frames[frameIndex],plane.x,plane.y,plane.width,plane.height);

}

}

}

/* LOOP */

let lastTime=0;

function loop(time){

let delta=(time-lastTime)/16.67;

lastTime=time;

update(delta);
draw();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

playMenuMusic();

</script>

</body>
</html>
