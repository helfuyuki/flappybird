<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>
body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let plane = {
x:80,
y:300,
width:40,
height:40,
velocity:0
};

let gravity = 0.2;
let jump = -8;

let towerX = canvas.width;
let gapY = 200;
let gapSize = 180;

let speed = 1.5;

let score = 0;
let passed = false;
let allahuAkbar = false;
let gameStarted = false;

function action(){

if(!gameStarted){
gameStarted = true;
return;
}

if(allahuAkbar){
resetGame();
}else{
plane.velocity = jump;
}

}

document.addEventListener("keydown", e=>{
if(e.code === "Space") action();
});

canvas.addEventListener("mousedown", action);
canvas.addEventListener("touchstart", e=>{
e.preventDefault();
action();
});

function resetGame(){

plane.y = 300;
plane.velocity = 0;

towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);

score = 0;
passed = false;
allahuAkbar = false;

}

function checkCollision(){

if(
plane.x < towerX + 60 &&
plane.x + plane.width > towerX &&
(
plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
allahuAkbar = true;
}

}

function update(){
if(!gameStarted) return;

if(allahuAkbar) return;

plane.velocity += gravity;
plane.y += plane.velocity;

if(plane.y < 0){
plane.y = 0;
plane.velocity = 0;
}

if(plane.y > canvas.height-plane.height){
allahuAkbar = true;
}

towerX -= speed;

if(towerX < -60){
towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);
passed = false;
}

if(towerX + 60 < plane.x && !passed){
score++;
passed = true;
}

checkCollision();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// jogador
ctx.fillStyle="red";
ctx.fillRect(plane.x,plane.y,plane.width,plane.height);

// torres
ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

// score
ctx.fillStyle="black";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,10,30);

// derrota
if(allahuAkbar){

ctx.font="40px Arial";
ctx.fillText("Allahu Akbar",70,300);

ctx.font="20px Arial";
ctx.fillText("Tap or SPACE to restart",70,340);
}
if(!gameStarted){

ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Tap to Start",120,300);

}
}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
