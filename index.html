<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>

body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* tamanho fixo evita reescalonamento pesado */
canvas{
background:white;
border:2px solid black;
touch-action:none;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* jogador */
let plane = {
x:80,
y:300,
w:40,
h:40,
v:0
};

let gravity = 0.5;
let jump = -9;

/* torres */
let towerX = canvas.width;
let gapY = 200;
let gapSize = 170;
let speed = 2;

/* estado */
let score = 0;
let passed = false;
let dead = false;

/* input */

function jumpAction(){

if(dead){
resetGame();
return;
}

plane.v = jump;

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space") jumpAction();
});

canvas.addEventListener("touchstart",(e)=>{
e.preventDefault();
jumpAction();
},{passive:false});

canvas.addEventListener("mousedown",jumpAction);

/* reset */

function resetGame(){

plane.y=300;
plane.v=0;

towerX=canvas.width;
gapY=Math.random()*(canvas.height-gapSize);

score=0;
passed=false;
dead=false;

}

/* colisão */

function collision(){

if(
plane.x < towerX+60 &&
plane.x+plane.w > towerX &&
(
plane.y < gapY ||
plane.y+plane.h > gapY+gapSize
)
){
dead=true;
}

}

/* update */

function update(){

if(dead) return;

plane.v+=gravity;
plane.y+=plane.v;

if(plane.y<0){
plane.y=0;
plane.v=0;
}

if(plane.y>canvas.height-plane.h){
dead=true;
}

towerX-=speed;

if(towerX<-60){
towerX=canvas.width;
gapY=Math.random()*(canvas.height-gapSize);
passed=false;
}

if(towerX+60<plane.x && !passed){
score++;
passed=true;
}

collision();

}

/* draw */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* player */

ctx.fillStyle="red";
ctx.fillRect(plane.x,plane.y,plane.w,plane.h);

/* towers */

ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

/* score */

ctx.fillStyle="black";
ctx.font="22px Arial";
ctx.fillText("Score: "+score,10,30);

/* death */

if(dead){

ctx.font="40px Arial";
ctx.fillText("Game Over",100,320);

ctx.font="20px Arial";
ctx.fillText("Tap to restart",130,350);

}

}

/* loop */

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
