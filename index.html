<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<style>

body{
margin:0;
background:skyblue;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border:2px solid black;
width:85vw;
max-width:420px;
height:auto;
}

</style>
</head>

<body>

<canvas id="game" width="400" height="800"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let plane = {
x:80,
y:300,
width:40,
height:40,
velocity:0
};

let gravity = 0.2;
let jump = -6;

let towerX = canvas.width;
let gapY = 200;
let gapSize = 180;

let speed = 1.5;

let score = 0;
let passed = false;
let allahuAkbar = false;

let gameState = "menu";
let menuOption = 0;
let jumpKey = "Space";
let waitingKey = false;

let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(isMobile){
gameState = "game";
}

function action(){

if(allahuAkbar){
resetGame();
return;
}

if(gameState === "game"){
plane.velocity = jump;
}

}

document.addEventListener("keydown", function(e){

if(gameState === "menu"){

if(waitingKey){
jumpKey = e.code;
waitingKey = false;
return;
}

if(e.code === "ArrowUp") menuOption = 0;
if(e.code === "ArrowDown") menuOption = 1;

if(e.code === "Enter"){

if(menuOption === 0){
gameState = "game";
}

if(menuOption === 1){
waitingKey = true;
}

}

return;
}

if(e.code === jumpKey){
action();
}

});

canvas.addEventListener("mousedown", action);

canvas.addEventListener("touchstart", function(){

if(gameState === "menu"){

if(menuOption === 0){
gameState = "game";
}

if(menuOption === 1){
waitingKey = true;
}

return;

}

action();

});

function resetGame(){

plane.y = 300;
plane.velocity = 0;

towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);

score = 0;
passed = false;
allahuAkbar = false;

gameState = isMobile ? "game" : "menu";

}

function checkCollision(){

if(
plane.x < towerX + 60 &&
plane.x + plane.width > towerX &&
(
plane.y < gapY ||
plane.y + plane.height > gapY + gapSize
)
){
allahuAkbar = true;
}

}

function update(delta){

if(gameState !== "game") return;
if(allahuAkbar) return;

plane.velocity += gravity * delta;
plane.y += plane.velocity * delta;

if(plane.y < 0){
plane.y = 0;
plane.velocity = 0;
}

if(plane.y > canvas.height-plane.height){
allahuAkbar = true;
}

towerX -= speed * delta;

if(towerX < -60){
towerX = canvas.width;
gapY = Math.random()*(canvas.height-gapSize);
passed = false;
}

if(towerX + 60 < plane.x && !passed){
score++;
passed = true;
}

checkCollision();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(gameState === "game"){

ctx.fillStyle="red";
ctx.fillRect(plane.x,plane.y,plane.width,plane.height);

ctx.fillStyle="gray";
ctx.fillRect(towerX,0,60,gapY);
ctx.fillRect(towerX,gapY+gapSize,60,canvas.height);

ctx.fillStyle="black";
ctx.font="24px Arial";
ctx.fillText("Score: "+score,10,30);

}

if(allahuAkbar){

ctx.font="40px Arial";
ctx.fillText("Allahu Akbar",70,300);

ctx.font="20px Arial";
ctx.fillText("Press Jump to Restart",70,340);

}

if(gameState === "menu"){

ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Plane Game",120,150);

ctx.font="20px Arial";

if(menuOption === 0){
ctx.fillText("> Start Game",130,250);
}else{
ctx.fillText("Start Game",130,250);
}

if(menuOption === 1){
ctx.fillText("> Change Jump Key",110,300);
}else{
ctx.fillText("Change Jump Key",110,300);
}

if(waitingKey){
ctx.fillText("Press a new key...",110,360);
}

}

}

let lastTime = 0;

function loop(time){

let delta = (time - lastTime) / 16.67;
lastTime = time;

update(delta);
draw();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>
