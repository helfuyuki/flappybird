```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Cidade</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
margin:auto;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const bg = new Image()
bg.src = "cenario.png"

let bgX = 0

let player = {
x:80,
y:300,
size:30,
vel:0
}

let gravity = 0.5
let jump = -8

let pipes = []
let pipeWidth = 80
let gap = 170
let speed = 2

let score = 0

function createPipe(){

let topHeight = Math.random() * 250 + 50

pipes.push({
x:canvas.width,
top:topHeight,
bottom:topHeight + gap,
passed:false
})

}

setInterval(createPipe,2000)

document.addEventListener("keydown",e=>{
if(e.code==="Space"){
player.vel = jump
}
})

canvas.addEventListener("click",()=>{
player.vel = jump
})

function update(){

player.vel += gravity
player.y += player.vel

if(player.y < 0) player.y = 0
if(player.y + player.size > canvas.height) restart()

pipes.forEach(pipe=>{

pipe.x -= speed

if(!pipe.passed && pipe.x + pipeWidth < player.x){
pipe.passed = true
score++
}

if(
player.x < pipe.x + pipeWidth &&
player.x + player.size > pipe.x &&
(
player.y < pipe.top ||
player.y + player.size > pipe.bottom
)
){
restart()
}

})

pipes = pipes.filter(p=>p.x + pipeWidth > 0)

bgX -= 0.5
if(bgX <= -canvas.width){
bgX = 0
}

}

function draw(){

ctx.drawImage(bg,bgX,0,canvas.width,canvas.height)
ctx.drawImage(bg,bgX + canvas.width,0,canvas.width,canvas.height)

ctx.fillStyle="#2c3e50"

pipes.forEach(pipe=>{

ctx.fillRect(pipe.x,0,pipeWidth,pipe.top)

ctx.fillRect(pipe.x,pipe.bottom,pipeWidth,canvas.height-pipe.bottom)

})

ctx.fillStyle="red"
ctx.fillRect(player.x,player.y,player.size,player.size)

ctx.fillStyle="black"
ctx.font="30px Arial"
ctx.fillText("Score: "+score,10,40)

}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

bg.onload = function(){
gameLoop()
}

function restart(){

player.y = 300
player.vel = 0
pipes = []
score = 0

}

</script>

</body>
</html>
